name: Adda247 PDF Batch Scraper

on:
  schedule:
    - cron: '0 0 * * 0' # Runs weekly
  workflow_dispatch: # Manual trigger

jobs:
  scrape_and_push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install requests beautifulsoup4

    - name: Run Scraper
      run: python scraper.py

    - name: Commit and Push
      run: |
        git config --global user.name "Karthikeyan-Bot"
        git config --global user.email "actions@github.com"
        
        # Ensure directory is tracked
        mkdir -p Longinsent_Archive
        git add Longinsent_Archive/
        
        # Check if there are changes to commit
        if [ -n "$(git status --porcelain)" ]; then
          git commit -m "Adda247 Batch: Added new PDF materials"
          git push origin main
        else
          echo "No changes to commit."
        fi
